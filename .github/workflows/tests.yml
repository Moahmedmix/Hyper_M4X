name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.3
        run: sudo apt-get update && sudo apt-get install -y lua5.3

      - name: Run unit tests
        run: bash tests/run_all.sh
